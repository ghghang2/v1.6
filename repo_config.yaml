DEFAULT_SYSTEM_PROMPT: |
  You are a helpful assistant with the singular goal of understanding and satisfying the user's requests. Never be lazy and always think step‑by‑step. Always list out multiple options before deciding on the best next step to take. You have tools available to you so leverage them when the opportunity arise. You must always review how the tool is designed to be used and ensure that you are using each tool correctly. If a tool call fails, you must immediately review what you did and assess thoroughly what caused the failure. Self‑improvement is core to your ethos, and you must be vigilant and self‑assessing at all times to ensure you are on the best trajectory possible to helping the user with the user's requests. **grep**: Never use the `..` flag; using `..` can cause timeouts. Never run commands like this `grep -R "search_term" -n ..` Never ever use emojis. When working on code that is version-controlled, check git status at the start of the task and before any push to verify you are committing the intended changes. After modifying any file that is tracked by git, always stage, commit with a descriptive message, and push before considering the task complete. Never push to git unless all tests are passing. Run the test suite immediately before any push. Run the test suite, list all failures, fix them in order of independence (fixes with no cross-dependencies first), verify after each fix, then push when all pass.

user_name: "ghghang2"
repo_name: "v1.6"
context_len: 32768
tail_len: 2
max_tool_output_chars: 16384
max_history_turns: 8

port: 8000
n_parallel: 1
ctx_size: 32768
n_gpu_layers: 999
service_info_path: "service_info.json"
llama_log_path: "llama_server.log"

IGNORED_ITEMS:
  - ".*"
  - "sample_data"
  - "llama-server"
  - "__pycache__"
  - "*.log"
  - "*.yml"
  - "*.json"
  - "*.out"
  - "*.db"

SUMMARY_PROMPT: |
  Write a detailed summary of the conversation above.
  Use plain text, no markdown.
  Include relevant code blocks.
  Cover: what the user asked for, what was done, which files were changed, and current status.
  Be specific — include actual file paths, function names, key implementation details, code and outcomes.
  Do not include any preamble or closing remarks.

# Context management constants
window_turns: 8
max_window_rows: 30
max_exchanges: 50
keep_recent_exchanges: 30

# Conversation loop constants
max_tool_turns: 200
stall_turns: 3


# L2 retrieval and context management
l2_write_threshold: 2.0
l2_retrieval_limit: 5
l2_min_importance_for_retrieval: 3.0
core_memory_active_entities_limit: 20
core_memory_error_history_limit: 5
summarizer_tool_chars: 2000

# Compression parameters
lossless_window: 10

# Retry parameters
max_retries: 3
initial_delay: 1.0
max_delay: 30.0
backoff_multiplier: 2.0

# Monitoring thresholds
log_tail_bytes: 8000
reread_rate_threshold: 0.15
error_compression_threshold: 0.10
llm_failure_threshold: 0.20
no_output_threshold: 0.40
poor_ratio_threshold: 0.85
low_sim_threshold: 0.70
high_invalidation_threshold: 0.30

# Email parameters
smtp_port: 587

# UI parameters
max_visible_widgets: 120

# Timeout parameters (in seconds)
browser_timeout: 60
tests_timeout: 60
other_tools_timeout: 30

# Browser default parameters (in milliseconds)
default_navigation_timeout: 30000
default_action_timeout: 5000
default_max_content_length: 8000